<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <style>
  .gameContent{
    text-align: center;
  }
    canvas {
    border: 2px solid black; 
    
}
  .bt {
    width: 60px;
    height: 60px;
    padding: 5px;
    cursor: pointer;
  }
  .bt img {
    width: 100%;  /* Faz a imagem caber no botão */
    height: 100%;
    image-rendering: pixelated; /* Mantém o estilo 8-bits nítido */
  }
  </style>
</head>
<body>
  <div class="gameContent">
  <canvas width="300" height="300" id="canvas"></canvas>
  </div>
  <div class="ferramentas">
    <button id="agua" class="bt"><img src="Spirits/agua.png"></button>
    <button id="chao" class="bt"><img src="Spirits/chao.png"></button>
    <button id="porco" class="bt"><img src="Spirits/porco.png"></button>
  </div>
  <script src="frontend/js/world.js"></script>
</body>
</html>
